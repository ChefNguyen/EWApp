server:
  port: ${SERVER_PORT:8080}
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  config:
    import: optional:file:.env[.properties]

  application:
    name: ewa

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://aws-1-ap-southeast-1.pooler.supabase.com:6543/postgres?sslmode=require&prepareThreshold=0}
    username: ${SPRING_DATASOURCE_USERNAME:postgres.rktlpjibumysjxjfcggi}
    password: ${SPRING_DATASOURCE_PASSWORD:Tannguyen28065}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 30000
      idle-timeout: 10000
      keepalive-time: 0
      maximum-pool-size: 2
      max-lifetime: 25000
      connection-test-query: SELECT 1
      minimum-idle: 0

  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: false

  http:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

logging:
  level:
    com.ewa.modules.chat: DEBUG
    org:
      springframework:
        web:
          servlet: DEBUG
          filter: DEBUG
    com.ewa: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

jwt:
  secret: ${JWT_SECRET:d0eff2cc4fd31183d73bd1ad913f228d33fb429340012133c7f5f05655bd4042}
  expiration: ${JWT_EXPIRATION:86400000}

sepay:
  base-url: ${SEPAY_BASE_URL:https://bankhub-api-sandbox.sepay.vn}
  api-key: ${SEPAY_API_KEY:}
  webhook-secret: ${SEPAY_WEBHOOK_SECRET:}


gemini:
  base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta}
  api-key: ${GEMINI_API_KEY:}
  model: ${GEMINI_MODEL:gemini-3.1-flash-lite}
  max-tokens: ${GEMINI_MAX_TOKENS:500}
  temperature: ${GEMINI_TEMPERATURE:0.2}

ewa:
  withdrawal:
    provider: ${EWA_WITHDRAWAL_PROVIDER:sepay}
    # When true, ledger entries are written immediately after SePay mock success
    # (before webhook). Webhook will skip writing if entry already exists (idempotent).
    commit-ledger-immediately: ${EWA_WITHDRAWAL_COMMIT_LEDGER_IMMEDIATELY:true}
  utility:
    provider: ${EWA_UTILITY_PROVIDER:mock}
    mock:
      failure-rate: ${EWA_UTILITY_MOCK_FAILURE_RATE:0.05}
      min-delay-ms: ${EWA_UTILITY_MOCK_MIN_DELAY_MS:1000}
      max-delay-ms: ${EWA_UTILITY_MOCK_MAX_DELAY_MS:2000}
